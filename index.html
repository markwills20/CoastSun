<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sunrise Beach Village</title>
    <style>
        :root { --bg: #0f1117; --card: #1a1d27; --accent: #6ee7b7; --text: #f0f4ff; --muted: #6b7280; --border: rgba(255,255,255,0.07); --radius: 16px; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; padding-bottom: 100px; }
        header { padding: 30px 20px; text-align: center; border-bottom: 1px solid var(--border); }
        header h1 { margin: 0; color: var(--accent); font-size: 24px; }
        .search-wrap { position: sticky; top: 0; background: var(--bg); padding: 16px; z-index: 10; box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
        .input-container { display: flex; gap: 10px; }
        .search-box-wrapper { position: relative; flex-grow: 1; }
        input { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid var(--border); background: var(--card); color: var(--text); font-size: 16px; box-sizing: border-box; outline: none; }
        .clear-btn { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: #374151; color: white; border: none; border-radius: 50%; width: 24px; height: 24px; cursor: pointer; display: none; align-items: center; justify-content: center; }
        .refresh-btn { background: var(--card); border: 1px solid var(--border); color: var(--accent); border-radius: 12px; padding: 0 15px; cursor: pointer; font-size: 22px; }
        .results { padding: 10px 16px; }
        .card { background: var(--card); padding: 16px; border-radius: var(--radius); margin-bottom: 10px; border: 1px solid var(--border); display: flex; align-items: center; gap: 16px; }
        .number { font-weight: 800; color: var(--accent); font-size: 22px; min-width: 45px; text-align: center; border-right: 1px solid var(--border); padding-right: 10px; }
        .name { font-size: 17px; font-weight: 500; }
        .empty { text-align: center; color: var(--muted); padding: 80px 20px; }
        /* This helps prevent the Tiiny.host banner from covering the last resident */
        .spacer { height: 120px; } 
    </style>
</head>
<body>

<header><h1>Sunrise Beach Village</h1></header>

<div class="search-wrap">
    <div class="input-container">
        <div class="search-box-wrapper">
            <input type="text" id="searchInput" placeholder="Search number or name..." autocomplete="off">
            <button class="clear-btn" id="clearBtn">&times;</button>
        </div>
        <button class="refresh-btn" id="refreshBtn">↻</button>
    </div>
</div>

<div class="results" id="results"></div>
<div class="spacer"></div>

<script>
    const SHEET_ID = '12Nh11u2twxuKinRx2y7eXcPpJNOGzqIm';
    const URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv`;

    let residents = [];

    async function loadData() {
        try {
            const resp = await fetch(URL + `&t=${Date.now()}`);
            const text = await resp.text();
            if (!resp.ok || text.includes("<!DOCTYPE html>")) return;

            const rows = text.split(/\r?\n/).slice(1);
            residents = rows.map(r => {
                const c = r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                return { num: c[0]?.replace(/"/g, '').trim(), name: c[1]?.replace(/"/g, '').trim() };
            }).filter(x => x.num);

            render(document.getElementById("searchInput").value); 
        } catch (e) {
            console.error("Sync error");
        }
    }

    function render(q) {
        const low = q.toLowerCase().trim();
        const resDiv = document.getElementById("results");
        document.getElementById("clearBtn").style.display = low ? "flex" : "none";
        
        if (!low) { resDiv.innerHTML = "<div class='empty'>Search Residents Above</div>"; return; }

        const filtered = residents.filter(r => r.num.toLowerCase().includes(low) || r.name.toLowerCase().includes(low));
        resDiv.innerHTML = filtered.length ? filtered.map(r => `
            <div class="card">
                <div class="number">${r.num}</div>
                <div class="name">${r.name || 'Vacant'}</div>
            </div>
        `).join("") : "<div class='empty'>No Matches</div>";
    }

    document.getElementById("searchInput").addEventListener("input", e => render(e.target.value));
    document.getElementById("clearBtn").addEventListener("click", () => { document.getElementById("searchInput").value = ""; render(""); });
    document.getElementById("refreshBtn").addEventListener("click", loadData);

    loadData();
</script>
</body>
</html>
